<app-header></app-header>

<div class="tierlist-container" *ngIf="authService.isAuthenticated; else loginTemplate">
  <div class="tierlists-selector-section">
    <div class="section-header">
      <h2>SAVED TIER LISTS</h2>
    </div>
    <div class="tierlists-grid">
      <div *ngFor="let listFile of tierLists" 
           class="tierlist-card" 
           [class.active]="currentTierListId === listFile.id"
           (click)="selectTierList(listFile)">
        <div class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <circle cx="3" cy="6" r="1"/>
            <circle cx="3" cy="12" r="1"/>
            <circle cx="3" cy="18" r="1"/>
          </svg>
        </div>
        <div class="card-details">
          <span class="card-name">{{ listFile.name.replace('.json', '') }}</span>
          <span class="card-date">Modified: {{ listFile.modifiedTime | date:'short' }}</span>
        </div>
        <div class="card-actions" (click)="$event.stopPropagation()">
          <button class="card-action-btn" (click)="openRenameDialog(listFile)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 3l4 4-7 7H10v-4l7-7z"/>
            </svg>
          </button>
          <button class="card-action-btn delete" (click)="deleteList(listFile)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="tierlist-card create-card" (click)="openCreateDialog()">
        <div class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
        <div class="card-details">
          <span class="card-name">Create New</span>
          <span class="card-subtitle">Blank Tier List</span>
        </div>
      </div>
    </div>
  </div>

  <div class="tierlist-header" *ngIf="tierList">
    <div class="title-section">
      <h1>{{ tierList.name }}</h1>
      <span class="unsaved-indicator" *ngIf="hasUnsavedChanges">Unsaved changes</span>
    </div>
    <div class="header-actions">
      <button class="action-btn save-btn" (click)="saveTierList()" [disabled]="saving" [class.unsaved]="hasUnsavedChanges">
        {{ saving ? 'Saving...' : 'Save Changes' }}
      </button>
      <button class="action-btn" (click)="exportAsJSON()">
        Export
      </button>
      <button class="action-btn" (click)="confirmReset()">
        Reset
      </button>
    </div>
  </div>

  <ng-container *ngIf="tierList">
    <div class="add-tier-section">
      <input type="text" class="tier-input" [(ngModel)]="newTierName" placeholder="New tier name..." (keyup.enter)="addTier()">
      <button class="add-tier-btn" (click)="addTier()">Add Tier</button>
    </div>

    <div class="tiers-container">
      <div *ngFor="let tier of tierList.tiers; let tierIndex = index" class="tier-row" 
           [class.drag-over]="dragOverTierId === tier.id"
           (dragover)="onDragOver($event, tier.id)"
           (drop)="onDrop($event, tier.id)">
        
        <div class="tier-label" [style.backgroundColor]="tier.color">
          <div class="tier-label-content">
            <div *ngIf="editingTierId !== tier.id" class="tier-name-display">
              <span class="tier-name">{{ tier.name }}</span>
              <div class="tier-actions">
                <button class="icon-btn" (click)="moveTierUp(tierIndex)" [disabled]="tierIndex === 0">
                  U
                </button>
                <button class="icon-btn" (click)="moveTierDown(tierIndex)" [disabled]="tierIndex === tierList.tiers.length - 1">
                  D
                </button>
                <button class="icon-btn" (click)="startEditTier(tier)">
                  E
                </button>
                <button class="icon-btn delete" (click)="confirmDeleteTier(tier.id)">
                  X
                </button>
              </div>
            </div>
            
            <div *ngIf="editingTierId === tier.id" class="tier-name-edit">
              <input type="text" [(ngModel)]="editingTierName" (keyup.enter)="saveTierEdit(tier)" (blur)="saveTierEdit(tier)" autofocus>
            </div>
            
            <input type="color" class="color-picker" [(ngModel)]="tier.color" (change)="updateTierColor(tier, $event)">
          </div>
        </div>
        
        <div class="tier-items">
          <div *ngFor="let item of tier.items; let itemIndex = index" class="tier-item" [class.has-image]="item.imageUrl" draggable="true"
               (dragstart)="onDragStart(item)" (dragend)="onDragEnd()">
            <div class="item-content">
              <div class="item-image" *ngIf="item.imageUrl">
                <img [src]="item.imageUrl" [alt]="item.text" (error)="item.imageUrl = undefined">
              </div>
              <div class="item-text" *ngIf="editingItemId !== item.id && !item.imageUrl">
                {{ item.text }}
              </div>
              <input type="text" class="item-edit-input" *ngIf="editingItemId === item.id" [(ngModel)]="editingItemText" 
                     (keyup.enter)="saveItemEdit(item)" (blur)="saveItemEdit(item)" autofocus>
            </div>
            <div class="item-actions">
              <button class="icon-btn small" (click)="moveItemUp(tier.id, itemIndex)" [disabled]="itemIndex === 0">
                U
              </button>
              <button class="icon-btn small" (click)="moveItemDown(tier.id, itemIndex)" [disabled]="itemIndex === tier.items.length - 1">
                D
              </button>
              <button class="icon-btn small" (click)="startEditItem(item)">
                E
              </button>
              <button class="icon-btn small delete" (click)="deleteItem(tier.id, item.id)">
                X
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="add-item-section">
      <h3>Add New Item</h3>
      <div class="add-item-form">
        <input type="text" class="item-text-input" [(ngModel)]="newItemText" placeholder="Item name..." (keyup.enter)="addItem()">
        <div class="image-option">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="showImageInput">
            Add image URL
          </label>
        </div>
        <input type="text" class="item-image-input" *ngIf="showImageInput" [(ngModel)]="newItemImageUrl" placeholder="Image URL...">
        <button class="add-item-btn" (click)="addItem()" [disabled]="!newItemText.trim()">Add Item</button>
      </div>
    </div>
  </ng-container>
</div>

<ng-template #loginTemplate>
  <app-drive-login></app-drive-login>
</ng-template>
