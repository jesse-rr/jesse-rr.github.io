<app-header></app-header>

<ng-container *ngIf="!isAuthenticated">
  <app-drive-login></app-drive-login>
</ng-container>

<ng-container *ngIf="isAuthenticated">
  <main class="music-page">
    <app-music-breadcrumb
      [items]="breadcrumb"
      (navigate)="navigateToBreadcrumb($event)"
      (logout)="logout()">
    </app-music-breadcrumb>

    <app-music-toolbar
      (createFolder)="onCreateFolder()"
      (uploadFiles)="onUploadFiles($event)"
      (refresh)="refresh()">
    </app-music-toolbar>

    <div class="upload-progress" *ngIf="uploadProgress !== null">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="uploadProgress"></div>
      </div>
      <span class="progress-text">Uploading... {{ uploadProgress }}%</span>
    </div>


    <div class="error-banner" *ngIf="error">
      <span>{{ error }}</span>
      <button class="error-retry" (click)="refresh()">Retry</button>
    </div>

    <div class="loading-container" *ngIf="loading">
      <div class="loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>

    <div class="content" *ngIf="!loading && !error">
      <div class="section" *ngIf="folders.length > 0">
        <h2 class="section-title">Playlists</h2>
        <div class="grid">
          <app-music-folder-card
            *ngFor="let folder of folders"
            [file]="folder"
            (open)="navigateToFolder(folder)"
            (contextMenu)="onContextMenu($event)">
          </app-music-folder-card>
        </div>
      </div>

      <div class="section" *ngIf="audioFiles.length > 0">
        <h2 class="section-title">Tracks</h2>
        <div class="file-list">
          <app-music-file-card
            *ngFor="let file of audioFiles; let i = index"
            [file]="file"
            [index]="i + 1"
            [isPlaying]="playingFile?.id === file.id"
            [isPaused]="playingFile?.id === file.id && !audioPlaying"
            (play)="onPlayFile(file)"
            (contextMenu)="onContextMenu($event)">
          </app-music-file-card>
        </div>
      </div>

      <div class="empty-state" *ngIf="folders.length === 0 && audioFiles.length === 0">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <h3>No music yet</h3>
        <p>Upload audio files or create a playlist folder to get started.</p>
      </div>
    </div>

    <div class="audio-player" *ngIf="playingFile">
      <audio
        #audioElement
        [src]="audioBlobUrl"
        (play)="onAudioPlay()"
        (pause)="onAudioPause()"
        (timeupdate)="onAudioTimeUpdate()"
        (loadedmetadata)="onAudioLoaded()"
        (ended)="onAudioEnded()">
      </audio>

      <button class="player-btn play-btn" (click)="togglePlayPause()" [disabled]="audioLoading">
        <div class="play-spinner" *ngIf="audioLoading"></div>
        <svg *ngIf="!audioLoading && !audioPlaying" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg *ngIf="!audioLoading && audioPlaying" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <div class="player-track">
        <span class="player-name">{{ playingFile.name }}</span>
        <div class="player-progress-row">
          <span class="player-time">{{ formatTime(audioCurrentTime) }}</span>
          <div class="player-progress" #progressBar (click)="onSeek($event, progressBar)">
            <div class="player-progress-fill" [style.width.%]="progressPercent"></div>
            <div class="player-progress-thumb" [style.left.%]="progressPercent"></div>
          </div>
          <span class="player-time">{{ formatTime(audioDuration) }}</span>
        </div>
      </div>

      <div class="player-volume">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path *ngIf="audioVolume > 0.5" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path *ngIf="audioVolume > 0" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input
          type="range"
          min="0"
          max="1"
          step="0.05"
          [value]="audioVolume"
          (input)="onVolumeChange($event)"
          class="volume-slider" />
      </div>

      <button class="player-btn close-btn" (click)="onStopPlayback()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </main>

  <app-context-menu
    *ngIf="contextMenuVisible"
    [x]="contextMenuX"
    [y]="contextMenuY"
    [target]="contextMenuTarget"
    (action)="onContextMenuAction($event)"
    (close)="onCloseContextMenu()">
  </app-context-menu>

  <app-rename-dialog
    *ngIf="renameDialogVisible && renameTarget"
    [currentName]="renameTarget.name"
    (rename)="onRename($event)"
    (cancel)="onCancelRename()">
  </app-rename-dialog>

  <app-move-dialog
    *ngIf="moveDialogVisible && moveTarget"
    [fileName]="moveTarget.name"
    (move)="onMove($event)"
    (cancel)="onCancelMove()">
  </app-move-dialog>

  <app-create-folder-dialog
    *ngIf="createFolderDialogVisible"
    (create)="onCreateFolderConfirm($event)"
    (cancel)="onCancelCreateFolder()">
  </app-create-folder-dialog>


  <div class="toast" *ngIf="toastMessage" [class.visible]="toastMessage">
    {{ toastMessage }}
  </div>
</ng-container>
