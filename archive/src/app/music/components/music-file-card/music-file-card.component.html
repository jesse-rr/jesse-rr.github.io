<div class="track" [class.playing]="isPlaying" [class.paused]="isPaused" (contextmenu)="onContextMenu($event)">
  <div class="track-index">
    <span class="index-num" *ngIf="!isPlaying">{{ index }}</span>
    <div class="equalizer" *ngIf="isPlaying">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <button class="track-play" (click)="onPlay($event)">
    <svg *ngIf="!isPlaying || isPaused" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    <svg *ngIf="isPlaying && !isPaused" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="4" width="4" height="16"/>
      <rect x="14" y="4" width="4" height="16"/>
    </svg>
  </button>

  <div class="track-info">
    <span class="track-name">{{ displayName }}</span>
    <span class="track-ext">{{ fileExt }}</span>
  </div>

  <span class="track-size">{{ fileSize }}</span>

  <button class="track-more" (click)="onContextMenu($event)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="12" cy="5" r="1.5"/>
      <circle cx="12" cy="12" r="1.5"/>
      <circle cx="12" cy="19" r="1.5"/>
    </svg>
  </button>
</div>
