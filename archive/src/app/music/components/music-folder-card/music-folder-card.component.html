<div class="folder-card" 
  [class.drag-over]="isDragOver"
  (click)="onClick()" 
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (contextmenu)="onContextMenu($event)">
  <div class="folder-tab">
    <svg class="folder-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
    <span class="folder-title">{{ file.name }}</span>
  </div>
  <div class="folder-inside"></div>
  <div class="folder-body">
    <div class="folder-vinyl">
      <div class="vinyl-inner"></div>
    </div>
  </div>
</div>
