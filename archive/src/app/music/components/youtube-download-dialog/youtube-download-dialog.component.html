<div class="overlay" (click)="cancel.emit()"></div>
<div class="dialog" (keydown)="onKeydown($event)">
  <h3 class="dialog-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    YouTube Download
  </h3>

  <label class="field-label">Video URL</label>
  <input
    class="dialog-input"
    type="text"
    [(ngModel)]="youtubeUrl"
    (keydown.enter)="onSubmit()"
    autofocus
    placeholder="https://youtube.com/watch?v=..." />

  <label class="field-label">Format</label>
  <div class="format-toggle">
    <button
      class="format-btn"
      [class.active]="format === 'mp3'"
      (click)="format = 'mp3'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      MP3
    </button>
    <button
      class="format-btn"
      [class.active]="format === 'mp4'"
      (click)="format = 'mp4'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
        <line x1="7" y1="2" x2="7" y2="22"/>
        <line x1="17" y1="2" x2="17" y2="22"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <line x1="2" y1="7" x2="7" y2="7"/>
        <line x1="2" y1="17" x2="7" y2="17"/>
        <line x1="17" y1="7" x2="22" y2="7"/>
        <line x1="17" y1="17" x2="22" y2="17"/>
      </svg>
      MP4
    </button>
  </div>

  <label class="field-label">Destination Folder</label>
  <div class="folder-tree" *ngIf="!foldersLoading">
    <ng-container *ngFor="let node of folders">
      <ng-container *ngTemplateOutlet="folderNode; context: { $implicit: node, depth: 0 }"></ng-container>
    </ng-container>
  </div>
  <div class="loading" *ngIf="foldersLoading">Loading folders...</div>

  <div class="dialog-actions">
    <button class="dialog-btn" (click)="cancel.emit()">Cancel</button>
    <button
      class="dialog-btn primary"
      (click)="onSubmit()"
      [disabled]="!isValid">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download
    </button>
  </div>
</div>

<ng-template #folderNode let-node let-depth="depth">
  <div
    class="tree-item"
    [class.selected]="selectedFolderId === node.file.id"
    [style.padding-left.px]="depth * 20 + 12"
    (click)="selectFolder(node)">
    <button class="expand-btn" (click)="toggleExpand(node); $event.stopPropagation()" *ngIf="node.children === undefined || (node.children && node.children.length > 0)">
      <svg
        width="12" height="12" viewBox="0 0 24 24" fill="currentColor"
        [style.transform]="node.expanded ? 'rotate(90deg)' : 'rotate(0deg)'"
        style="transition: transform 0.2s">
        <polygon points="6 4 20 12 6 20 6 4"/>
      </svg>
    </button>
    <div class="expand-spacer" *ngIf="node.children && node.children.length === 0"></div>

    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>
    <span class="tree-name">{{ node.file.name }}</span>
    <span class="tree-loading" *ngIf="node.loading">...</span>
  </div>

  <ng-container *ngIf="node.expanded && node.children">
    <ng-container *ngFor="let child of node.children">
      <ng-container *ngTemplateOutlet="folderNode; context: { $implicit: child, depth: depth + 1 }"></ng-container>
    </ng-container>
  </ng-container>
</ng-template>
