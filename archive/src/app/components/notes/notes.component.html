<div class="notes-container" *ngIf="authService.isAuthenticated; else loginTemplate">
    <div class="editor-pane">
        <div class="editor-header">
            <input
                    type="text"
                    class="note-title"
                    [(ngModel)]="currentNoteTitle"
                    placeholder="Note title..."
                    (blur)="saveNote()"
            />
            <div class="editor-actions">
                <button class="action-btn" (click)="createNewNote()" title="New note">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
                <button class="action-btn" (click)="saveNote()" [disabled]="saving" title="Save">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                </button>
                <button class="action-btn" (click)="deleteCurrentNote()" title="Delete">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>
        </div>
        <textarea
                class="markdown-editor"
                [(ngModel)]="currentNoteContent"
                (blur)="saveNote()"
                placeholder="# Write your note here...&#10;&#10;Supports Markdown syntax"
        ></textarea>
    </div>

    <div class="preview-pane">
        <div class="preview-header">
            <span>Preview</span>
            <button class="action-btn" (click)="toggleTheme()" title="Toggle theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
        <div class="markdown-preview" [innerHTML]="renderedMarkdown"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>Notes</span>
            <button class="action-btn" (click)="loadNotes()" title="Refresh">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6"/>
                    <path d="M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
                    <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
                </svg>
            </button>
        </div>
        <div class="folder-breadcrumb">
            <button *ngFor="let folder of folderPath; let i = index" (click)="navigateToFolder(i)">
                {{ folder.name }} <span *ngIf="i < folderPath.length - 1">/</span>
            </button>
        </div>
        <div class="folder-list">
            <div *ngFor="let item of folderContents" class="folder-item" [class.active]="selectedNote?.id === item.id" (click)="openNote(item)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path *ngIf="item.mimeType === folderMime" d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path *ngIf="item.mimeType === folderMime" d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    <path *ngIf="item.mimeType !== folderMime" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline *ngIf="item.mimeType !== folderMime" points="14 2 14 8 20 8"/>
                </svg>
                <span class="item-name">{{ item.name }}</span>
                <span class="item-date" *ngIf="item.modifiedTime">{{ item.modifiedTime | date:'short' }}</span>
            </div>
        </div>
        <button class="new-folder-btn" (click)="createNewFolder()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                <line x1="12" y1="11" x2="12" y2="17"/>
                <line x1="9" y1="14" x2="15" y2="14"/>
            </svg>
            New Folder
        </button>
    </div>
</div>

<ng-template #loginTemplate>
    <app-drive-login></app-drive-login>
</ng-template>
