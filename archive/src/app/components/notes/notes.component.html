<!-- notes.component.html -->
<app-header></app-header>

<div class="notes-app" *ngIf="authService.isAuthenticated; else loginTemplate">
  <div class="notes-toolbar">
    <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <button class="toggle-btn" (click)="toggleEditor()" title="Toggle Editor">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 3l4 4-7 7H10v-4l7-7z"/>
        <path d="M4 20h16"/>
      </svg>
    </button>
    <button class="toggle-btn" (click)="togglePreview()" title="Toggle Preview">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <div class="spacer"></div>
    <button class="action-btn" (click)="showCreateNoteModal()" title="New Note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      <span>Note</span>
    </button>
    <button class="action-btn" (click)="showCreateFolderModal()" title="New Folder">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
      <span>Folder</span>
    </button>
    <button class="action-btn" (click)="refreshNotes()" title="Refresh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
        <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
      </svg>
    </button>
  </div>

  <div class="notes-main" [class.sidebar-hidden]="!sidebarVisible" [class.editor-hidden]="!editorVisible" [class.preview-hidden]="!previewVisible">
    <div class="notes-sidebar" *ngIf="sidebarVisible">
      <div class="breadcrumb">
        <button *ngFor="let folder of noteFolderPath; let i = index" (click)="navigateToFolder(i)">
          {{ folder.name }} <span *ngIf="i < noteFolderPath.length - 1">/</span>
        </button>
      </div>
      <div class="notes-list">
        <div class="notes-list-header">Notes & Folders</div>
        <div *ngFor="let item of noteFolderContents" class="note-item" [class.active]="selectedNote?.id === item.id" (click)="openNote(item)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path *ngIf="item.mimeType === folderMime" d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path *ngIf="item.mimeType === folderMime" d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            <path *ngIf="item.mimeType !== folderMime" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline *ngIf="item.mimeType !== folderMime" points="14 2 14 8 20 8"/>
          </svg>
          <span class="note-name">{{ item.name }}</span>
        </div>
        <div *ngIf="noteFolderContents.length === 0" class="empty-notes">No notes or folders</div>
      </div>
    </div>

    <div class="notes-editor" *ngIf="editorVisible">
      <div class="editor-header" *ngIf="selectedNote">
        <input type="text" class="note-title-input" [(ngModel)]="currentNoteTitle" (input)="onContentChange()" placeholder="Note title"/>
        <button class="delete-btn" (click)="deleteCurrentNote()" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <textarea class="editor-textarea" *ngIf="selectedNote" [(ngModel)]="currentNoteContent" (input)="onContentChange()" placeholder="# Write your markdown here...&#10;&#10;Supports:&#10;- Headers, lists, code blocks&#10;- Images: ![alt](url)&#10;- Links: [text](url)&#10;- HTML tags"></textarea>
      <div class="empty-state-editor" *ngIf="!selectedNote">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <p>Select a note from the sidebar</p>
      </div>
    </div>

    <div class="notes-preview" *ngIf="previewVisible && selectedNote">
      <div class="preview-content" [innerHTML]="renderedMarkdown"></div>
    </div>

    <div class="empty-state-preview" *ngIf="previewVisible && !selectedNote">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <p>No note selected</p>
    </div>
  </div>
</div>

<div class="modal" *ngIf="modalVisible" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ modalTitle }}</h3>
      <button class="modal-close" (click)="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-input" [(ngModel)]="modalInput" placeholder="Enter name..." (keyup.enter)="confirmModal()" autofocus>
    </div>
    <div class="modal-footer">
      <button class="modal-btn cancel" (click)="closeModal()">Cancel</button>
      <button class="modal-btn confirm" (click)="confirmModal()">Create</button>
    </div>
  </div>
</div>

<ng-template #loginTemplate>
  <app-drive-login></app-drive-login>
</ng-template>
