<app-header></app-header>
<div class="notes-app" *ngIf="authService.isAuthenticated; else loginTemplate">
  <div class="notes-toolbar">
    <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <button class="toggle-btn" (click)="toggleEditor()" title="Toggle Editor">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 3l4 4-7 7H10v-4l7-7z"/>
        <path d="M4 20h16"/>
      </svg>
    </button>
    <button class="toggle-btn" (click)="togglePreview()" title="Toggle Preview">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <div class="spacer"></div>
    <button class="action-btn" (click)="createNewNote()" title="New Note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
    <button class="action-btn" (click)="createNewFolder()" title="New Folder">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
    </button>
    <button class="action-btn" (click)="refreshNotes()" title="Refresh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
        <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
      </svg>
    </button>
    <button class="action-btn" (click)="toggleTheme()" title="Toggle Theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <div class="notes-main" [class.sidebar-hidden]="!sidebarVisible" [class.editor-hidden]="!editorVisible" [class.preview-hidden]="!previewVisible">
    <div class="notes-sidebar" *ngIf="sidebarVisible">
      <div class="breadcrumb">
        <button *ngFor="let folder of noteFolderPath; let i = index" (click)="navigateToFolder(i)">
          {{ folder.name }} <span *ngIf="i < noteFolderPath.length - 1">/</span>
        </button>
      </div>
      <div class="notes-list">
        <div *ngFor="let item of noteFolderContents" class="note-item" [class.active]="selectedNote?.id === item.id" (click)="openNote(item)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path *ngIf="item.mimeType === folderMime" d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path *ngIf="item.mimeType === folderMime" d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            <path *ngIf="item.mimeType !== folderMime" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline *ngIf="item.mimeType !== folderMime" points="14 2 14 8 20 8"/>
          </svg>
          <span class="note-name">{{ item.name }}</span>
        </div>
        <div *ngIf="noteFolderContents.length === 0" class="empty-notes">No notes or folders</div>
      </div>
    </div>

    <div class="notes-editor" *ngIf="editorVisible && selectedNote">
      <div class="editor-header">
        <input type="text" class="note-title-input" [(ngModel)]="currentNoteTitle" (input)="onContentChange()" placeholder="Note title"/>
      </div>
      <textarea class="editor-textarea" [(ngModel)]="currentNoteContent" (input)="onContentChange()" placeholder="# Write your markdown here..."></textarea>
    </div>

    <div class="notes-preview" *ngIf="previewVisible && selectedNote">
      <div class="preview-content" [innerHTML]="renderedMarkdown"></div>
    </div>

    <div class="empty-state" *ngIf="!selectedNote && editorVisible">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <p>Select a note or create a new one</p>
    </div>
  </div>
</div>

<ng-template #loginTemplate>
  <app-drive-login></app-drive-login>
</ng-template>
