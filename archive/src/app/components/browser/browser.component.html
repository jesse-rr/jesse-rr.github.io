<app-header></app-header>

<main class="browser-container">
  <!-- AUTHENTICATION CHECK -->
  <ng-container *ngIf="!(authService.accessToken$ | async); else browserContent">
    <app-drive-login></app-drive-login>
  </ng-container>

  <ng-template #browserContent>
    <!-- GITHUB PROJECTS SECTION -->
    <section class="projects-section">
      <h2 class="section-title">GitHub Repositories</h2>
      <ul class="projects-list">
        <li *ngFor="let proj of githubProjects">
          <a [href]="proj.url" target="_blank" class="project-link">{{ proj.name }}</a>
          <span class="project-desc"> — {{ proj.description }}</span>
        </li>
      </ul>
    </section>

    <!-- DRIVE EXPLORER SECTION -->
    <section class="drive-explorer">
      <h2 class="section-title font-large">Google Drive File Explorer</h2>

      <!-- BREADCRUMBS -->
      <div class="breadcrumbs">
        <span class="root-label">Drive: </span>
        <span *ngFor="let folder of folderPath; let i = index" class="path-node" (click)="navigatePath(i)">
          {{ folder.name }}
          <span class="separator" *ngIf="i < folderPath.length - 1"> / </span>
        </span>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="categories">
          <button *ngFor="let cat of categories" class="cat-btn" [class.active]="selectedCategory === cat" (click)="selectedCategory = cat">
            {{ cat }}
          </button>
        </div>

        <input class="search-bar" type="text" placeholder="Search files in current folder..." [(ngModel)]="searchQuery" />
      </div>

      <!-- GRID LIST OF ITEMS -->
      <div class="explorer-grid">
        <div *ngFor="let item of filteredContents" class="item-row">
          <!-- Folder Interaction -->
          <ng-container *ngIf="item.mimeType === folderMime; else fileTemplate">
            <button class="item-button folder-item" (click)="navigateToFolder(item.id)">
              <span class="item-type-tag">[Folder]</span>
              <span class="item-name">{{ item.name }}</span>
            </button>
          </ng-container>

          <!-- File Interaction -->
          <ng-template #fileTemplate>
            <button class="item-button file-item" (click)="openFileLink(item)">
              <span class="item-type-tag">[{{ getFileTypeLabel(item) }}]</span>
              <span class="item-name">{{ item.name }}</span>
            </button>
          </ng-template>
        </div>

        <div *ngIf="filteredContents.length === 0" class="empty-state">
          No files or folders matching your filters.
        </div>
      </div>
    </section>
  </ng-template>
</main>
